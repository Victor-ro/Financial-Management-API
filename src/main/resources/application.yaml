spring:
  application:
    name: financial-management

    datasource:
      url: jdbc:h2:mem:financedb
      driver-class-name: org.h2.driver
      username: sa
      password:

    h2:
      console:
        enabled: true
        path: /h2-console

    jpa:
      show-sql: true
      hibernate:
        ddl-auto: update
      properties:
        hibernate:
          format-sql: true

